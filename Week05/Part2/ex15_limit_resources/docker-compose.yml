services:
  mysql_db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mydb
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: 0.5

  node_app:
    build: .
    ports:
      - 3000:3000
    depends_on:
      mysql_db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: 0.2
          memory: 80M

  